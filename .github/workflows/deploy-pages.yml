# Deploy to GitHub Pages and inject firebase-config.js from a secret (no API key in repo)
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create firebase-config.js from secret
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: |
          if [ -z "$FIREBASE_CONFIG" ]; then
            echo "::warning::FIREBASE_CONFIG secret not set – copying example (線上對戰 will not work)"
            cp firebase-config.js.example firebase-config.js
          else
            printf '%s' "$FIREBASE_CONFIG" > firebase-config.js
          fi
          if ! grep -q 'databaseURL' firebase-config.js || grep -q 'YOUR_PROJECT_ID' firebase-config.js; then
            echo "::warning::firebase-config.js may be invalid (missing or placeholder databaseURL). Set FIREBASE_CONFIG secret with your real config."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
